name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run frontend tests
        run: npm test -- --watch=false

  build-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/docker-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/build-and-push
        with:
          service: frontend

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 26
          distribution: temurin
      - name: Run backend tests
        run: |
          chmod +x mvnw
          ./mvnw test

  build-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/docker-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/build-and-push
        with:
          service: backend

  build-database:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Create init.sql from secret
        run: echo "${{ secrets.INIT_SQL }}" > database/init.sql
      - uses: ./.github/actions/docker-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/build-and-push
        with:
          service: database

  deploy:
    runs-on: self-hosted
    needs: [build-frontend, build-backend, build-database]
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Create database secret
        run: kubectl create secret generic db-secret --from-literal=DB_NAME="${{ secrets.DB_NAME }}" --from-literal=DB_USER="${{ secrets.DB_USER }}" --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" --from-literal=DB_ROOT_PASSWORD="${{ secrets.DB_ROOT_PASSWORD }}" --from-literal=SPRING_DATASOURCE_URL="jdbc:mysql://database:3306/${{ secrets.DB_NAME }}" --save-config --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/database.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl rollout restart deployment/database
          kubectl rollout restart deployment/backend
          kubectl rollout restart deployment/frontend