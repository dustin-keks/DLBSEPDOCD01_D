name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: ./.github/actions/checkout-code
      - uses: ./.github/actions/docker-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/build-and-push
        with:
          service: frontend

  build-backend:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: ./.github/actions/checkout-code
      - uses: ./.github/actions/docker-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/build-and-push
        with:
          service: backend

  build-database:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: ./.github/actions/checkout-code
      - name: Create init.sql from secret
        run: echo "${{ secrets.INIT_SQL }}" > database/init.sql
      - uses: ./.github/actions/docker-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/build-and-push
        with:
          service: database