name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run frontend tests
        run: npm test -- --watch=false

  build-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/docker-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/build-and-push
        with:
          service: frontend

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 26
          distribution: temurin
      - name: Run backend tests
        run: |
          chmod +x mvnw
          ./mvnw test

  build-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/docker-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/build-and-push
        with:
          service: backend

  build-database:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Create init.sql from secret
        run: echo "${{ secrets.INIT_SQL }}" > database/init.sql
      - uses: ./.github/actions/docker-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/build-and-push
        with:
          service: database