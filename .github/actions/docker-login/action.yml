name: Docker Login
description: Log in to GitHub Container Registry

inputs:
  token:
    description: GitHub Token
    required: true

runs:
  using: composite
  steps:
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.token }}